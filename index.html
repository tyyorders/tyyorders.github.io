<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>點餐小助手</title>
<style>
  :root {
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --red: #dc2626;
    --red-light: #fef2f2;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a2332;
    --text-2: #4a5568;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  .hero {
    background: linear-gradient(140deg, #0f2544 0%, #1e3a5f 40%, #1a56db 100%);
    padding: 2rem 2rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 40px;
    background: var(--bg);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .hero-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .hero-badge {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 0.9rem;
    font-size: 2rem;
    flex-shrink: 0;
  }
  .hero-inner h1 {
    color: white;
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.04em;
  }
  .server-status {
    margin-left: auto;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    padding: 0.35rem 0.9rem;
    color: rgba(255,255,255,0.8);
    font-size: 0.78rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #86efac;
    animation: pulse 2s infinite;
  }
  .dot.offline { background: #fca5a5; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .main {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .app-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.6rem 1.5rem;
    border: 2px solid transparent;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .app-card:hover, .app-card:active {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .app-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 2px 0 0 2px;
    opacity: 0.3;
    transition: opacity 0.18s;
  }
  .app-card:hover::before, .app-card:active::before { opacity: 1; }

  .app-card.blue { color: var(--blue); }
  .app-card.blue::before { background: var(--blue); }
  .app-card.blue:hover, .app-card.blue:active { border-color: var(--blue); }
  .app-card.red { color: var(--red); }
  .app-card.red::before { background: var(--red); }
  .app-card.red:hover, .app-card.red:active { border-color: var(--red); }
  .app-card.green { color: #16a34a; }
  .app-card.green::before { background: #16a34a; }
  .app-card.green:hover, .app-card.green:active { border-color: #16a34a; }

  .app-icon {
    width: 58px; height: 58px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
  }
  .app-card.blue .app-icon { background: var(--blue-light); }
  .app-card.red .app-icon { background: var(--red-light); }
  .app-card.green .app-icon { background: #dcfce7; }

  .app-info { flex: 1; }
  .app-name { font-size: 1.1rem; font-weight: 800; color: var(--text); }
  .app-desc { font-size: 0.83rem; color: var(--text-2); margin-top: 0.25rem; }
  .app-badge {
    font-size: 0.7rem; font-weight: 700;
    padding: 0.2rem 0.6rem; border-radius: 999px;
    margin-top: 0.45rem; display: inline-block;
  }
  .app-card.blue .app-badge { background: var(--blue-light); color: var(--blue); }
  .app-card.red .app-badge { background: var(--red-light); color: var(--red); }
  .app-card.green .app-badge { background: #dcfce7; color: #16a34a; }

  .app-arrow { color: #cbd5e1; font-size: 1.2rem; flex-shrink: 0; transition: color 0.18s; }
  .app-card:hover .app-arrow, .app-card:active .app-arrow { color: currentColor; }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,25,45,0.6); z-index: 100;
    backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
  }
  .overlay.active { display: flex; }
  .dialog {
    background: white; border-radius: 18px; padding: 2rem;
    width: 90vw; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: pop 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
  .dialog h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.4rem; }
  .dialog p { font-size: 0.85rem; color: var(--text-2); margin-bottom: 1.2rem; }
  .dialog input {
    width: 100%; padding: 0.7rem 1rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 1rem; font-family: inherit; margin-bottom: 0.8rem;
    outline: none; transition: border-color 0.2s;
  }
  .dialog input:focus { border-color: var(--blue); }
  .dialog-error { color: var(--red); font-size: 0.82rem; margin-bottom: 0.8rem; min-height: 1.2em; }
  .dialog-btns { display: flex; gap: 0.6rem; justify-content: flex-end; }
  .btn { padding: 0.65rem 1.4rem; border-radius: 9px; border: none; cursor: pointer; font-size: 0.9rem; font-family: inherit; font-weight: 700; transition: all 0.2s; }
  .btn-secondary { background: #f1f5f9; color: var(--text-2); }
  .btn-secondary:hover { background: var(--border); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #1d4ed8; }

  @media (max-width: 480px) {
    .hero { padding: 1.5rem 1rem 2.5rem; }
    .server-status { display: none; }
    .main { padding: 1.2rem 0.8rem 3rem; }
    .app-card { padding: 1.4rem 1.2rem; }
    .app-icon { width: 52px; height: 52px; font-size: 1.6rem; }
  }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <div class="hero-badge">🍱</div>
    <h1>點餐小助手</h1>
    <div class="server-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">連線中...</span>
    </div>
  </div>
</header>

<main class="main">

  <a class="app-card blue" href="order.html">
    <div class="app-icon">🍱</div>
    <div class="app-info">
      <div class="app-name">點餐系統</div>
      <div class="app-desc">查看開團、送出訂單、查詢記錄</div>
      <span class="app-badge">個人版</span>
    </div>
    <div class="app-arrow">→</div>
  </a>

  <a class="app-card green" href="group-admin.html">
    <div class="app-icon">👑</div>
    <div class="app-info">
      <div class="app-name">團購揪團主專用</div>
      <div class="app-desc">發起開團、獨立私房菜單、一鍵請款</div>
      <span class="app-badge">人人皆主</span>
    </div>
    <div class="app-arrow">→</div>
  </a>

  <!-- 許願池入口 -->
  <a class="app-card" style="background:#fffbeb;border:1px solid #fde68a" href="wish.html">
    <div class="app-icon" style="background:#fef3c7;color:#d97706">✨</div>
    <div class="app-info">
      <div class="app-name" style="color:#92400e">新店家許願池</div>
      <div class="app-desc" style="color:#b45309">吃膩了嗎？推薦私房愛店，揪同事按讚上架！</div>
      <span class="app-badge" style="background:#fef3c7;color:#d97706">開放祈願</span>
    </div>
    <div class="app-arrow" style="color:#fbbf24">→</div>
  </a>

  <a class="app-card red" href="order-admin.html">
    <div class="app-icon">🍔</div>
    <div class="app-info">
      <div class="app-name">系統大後台</div>
      <div class="app-desc">強制管理所有訂單、刪除帳號特權</div>
      <span class="app-badge">限總管</span>
    </div>
    <div class="app-arrow">→</div>
  </a>

</main>

<div class="overlay" id="authOverlay">
  <div class="dialog">
    <h3 id="authTitle">🔐 身分驗證</h3>
    <p id="authDesc">此功能僅供授權人員使用，請輸入密碼。</p>
    <input type="password" id="authPwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doAuth()">
    <div class="dialog-error" id="authError"></div>
    <div class="dialog-btns">
      <button class="btn btn-secondary" onclick="closeAuth()">取消</button>
      <button class="btn btn-primary" onclick="doAuth()">確認</button>
    </div>
  </div>
</div>

<script>
const SERVER = 'https://lunch-order-173311611761.asia-east1.run.app';

async function checkServer() {
  try {
    const res = await fetch(`${SERVER}/api/health`, { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = `伺服器正常 ${data.time||''}`;
  } catch {
    document.getElementById('statusDot').className = 'dot offline';
    document.getElementById('statusText').textContent = '伺服器無回應';
  }
}

let _pendingRole = '', _pendingUrl = '';
function closeAuth() {
  document.getElementById('authOverlay').classList.remove('active');
}
async function doAuth() {
  const pwd = document.getElementById('authPwd').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  try {
    const res = await fetch(`${SERVER}/api/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: _pendingRole, password: pwd }),
      signal: AbortSignal.timeout(5000)
    });
    if (res.ok) { closeAuth(); window.location.href = _pendingUrl; }
    else { errEl.textContent = '❌ 密碼不正確，請再試一次。'; }
  } catch {
    errEl.textContent = '⚠️ 無法連線至伺服器，請確認網路或聯繫管理員。';
  }
}
document.getElementById('authOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAuth();
});

checkServer();
</script>
</body>
</html>
